# ============================================
#  Student Service - application.properties
#  Port: 8081
#  Database: MySQL Workbench
# ============================================

server.port=8081
spring.application.name=student-service

# ============================================
# MySQL Workbench Configuration
# Make sure MySQL Server is running on port 3306
# Update username and password as per your MySQL setup
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/studentdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=pra12@vin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate Settings
# ddl-auto=update will auto-create/update tables
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
